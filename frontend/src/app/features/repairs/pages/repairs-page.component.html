<section class="page" style="min-height: calc(100dvh - 50px);">
  <section
    class="workspace"
    style="display: flex; flex-direction: column; min-height: calc(100dvh - 50px); background: #fff;"
  >
    <div class="workspace-header" style="justify-content: flex-start; flex: 0 0 auto;">
      <div class="toolbar" style="justify-content: flex-start; width: 100%; max-width: none; flex-wrap: wrap;">
        <label
          class="search-field"
          for="globalSearch"
          style="flex: 0 1 520px; max-width: 520px;"
        >
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="m21 21-4.35-4.35m2.35-5.65a8 8 0 1 1-16 0 8 8 0 0 1 16 0Z"></path>
            </svg>
          </span>
          <input
            id="globalSearch"
            type="search"
            [value]="searchTerm"
            (input)="setSearch($any($event.target).value)"
            placeholder="Buscar familia, issue, categoría, parte..."
          >
          <button
            *ngIf="searchTerm"
            type="button"
            class="clear-search"
            aria-label="Limpiar búsqueda"
            (click)="setSearch('')"
          >×</button>
        </label>

        <div
          class="date-range-filter"
          style="display: flex; align-items: center; gap: 6px; flex: 0 0 auto; flex-wrap: wrap;"
          aria-label="Filtro por rango de fechas"
        >
          <label style="display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 0.72rem;">
            <span>Desde</span>
            <input
              type="date"
              [value]="dateFrom"
              [attr.max]="dateTo || null"
              (change)="setDateFrom($any($event.target).value)"
              style="height: 38px; padding: 0 9px; border: 1px solid var(--border); border-radius: 9px; color: var(--text); background: var(--surface-subtle);"
            >
          </label>

          <label style="display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 0.72rem;">
            <span>Hasta</span>
            <input
              type="date"
              [value]="dateTo"
              [attr.min]="dateFrom || null"
              (change)="setDateTo($any($event.target).value)"
              style="height: 38px; padding: 0 9px; border: 1px solid var(--border); border-radius: 9px; color: var(--text); background: var(--surface-subtle);"
            >
          </label>

          <button
            *ngIf="dateFrom || dateTo"
            type="button"
            aria-label="Limpiar rango de fechas"
            title="Limpiar rango de fechas"
            (click)="clearDateRange()"
            style="display: grid; place-items: center; width: 32px; height: 32px; padding: 0; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); background: #fff; cursor: pointer;"
          >×</button>
        </div>

        <button *ngIf="activeFilterCount" type="button" class="secondary-button" (click)="clearFilters()">
          Limpiar filtros
          <span>{{ activeFilterCount }}</span>
        </button>

        <button
          type="button"
          class="create-button"
          style="margin-left: auto;"
          (click)="openNewRepair()"
        >
          <span class="button-icon" aria-hidden="true">+</span>
          Crear reporte
        </button>
      </div>
    </div>

    <app-repair-list
      style="display: block; flex: 1 1 auto; min-height: 0;"
      [repairs]="pagedRepairs"
      [filters]="filters"
      [availableValues]="availableValues"
      [sort]="sort"
      (filterChange)="updateFilter($event.key, $event.values)"
      (sortChange)="updateSort($event)"
      (edit)="openEditRepair($event)"
      (remove)="removeRepair($event)"
    ></app-repair-list>

    <footer class="pagination" style="flex: 0 0 auto;" *ngIf="filteredRepairs.length">
      <div class="pagination-meta">
        <div class="page-size">
          <span>Filas por página</span>
          <select [value]="pageSize" (change)="setPageSize($any($event.target).value)">
            <option [value]="8">8</option>
            <option [value]="12">12</option>
            <option [value]="20">20</option>
            <option [value]="50">50</option>
          </select>
        </div>
      </div>

      <div class="pager-wrap">
        <div class="pager" aria-label="Paginación">
          <button type="button" aria-label="Primera página" [disabled]="currentPage === 1" (click)="goToPage(1)">«</button>
          <button type="button" aria-label="Página anterior" [disabled]="currentPage === 1" (click)="goToPage(currentPage - 1)">‹</button>
          <button
            *ngFor="let pageNumber of pageButtons"
            type="button"
            class="page-button"
            [class.active]="pageNumber === currentPage"
            [attr.aria-current]="pageNumber === currentPage ? 'page' : null"
            (click)="goToPage(pageNumber)"
          >{{ pageNumber }}</button>
          <button type="button" aria-label="Página siguiente" [disabled]="currentPage === totalPages" (click)="goToPage(currentPage + 1)">›</button>
          <button type="button" aria-label="Última página" [disabled]="currentPage === totalPages" (click)="goToPage(totalPages)">»</button>
        </div>
      </div>

      <div class="pagination-total">
        <span class="total-records">
          <strong>{{ repairs.length | number }}</strong> registros
        </span>
      </div>
    </footer>
  </section>
</section>
